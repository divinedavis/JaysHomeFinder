<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <rect width="1200" height="630" fill="#0a0a0f"/>
  <rect x="0" y="0" width="1200" height="630" fill="url(#bg)"/>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#12121a"/>
      <stop offset="100%" style="stop-color:#0a0a0f"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
  </defs>
  <!-- House icon -->
  <g transform="translate(600, 200)">
    <!-- Roof -->
    <polygon points="0,-120 -140,0 -110,0 -110,80 110,80 110,0 140,0" fill="none" stroke="#6366f1" stroke-width="4"/>
    <polygon points="0,-120 -140,0 140,0" fill="#6366f1" opacity="0.2"/>
    <!-- House body -->
    <rect x="-110" y="0" width="220" height="80" fill="#6366f1" opacity="0.1" stroke="#6366f1" stroke-width="3"/>
    <!-- Door -->
    <rect x="-20" y="20" width="40" height="60" rx="3" fill="#6366f1" opacity="0.3" stroke="#6366f1" stroke-width="2"/>
    <circle cx="14" cy="52" r="3" fill="#f59e0b"/>
    <!-- Windows -->
    <rect x="-85" y="20" width="40" height="35" rx="2" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
    <rect x="45" y="20" width="40" height="35" rx="2" fill="#f59e0b" opacity="0.2" stroke="#f59e0b" stroke-width="2"/>
    <!-- Window crosses -->
    <line x1="-65" y1="20" x2="-65" y2="55" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="-85" y1="37" x2="-45" y2="37" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="65" y1="20" x2="65" y2="55" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
    <line x1="45" y1="37" x2="85" y2="37" stroke="#f59e0b" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- Title -->
  <text x="600" y="380" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="52" font-weight="700" fill="url(#accent)">Jay&#39;s Home Finder</text>
  <!-- Subtitle -->
  <text x="600" y="430" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="24" fill="#888">Road to $3M &#8226; Brooklyn Coffee Shop Building</text>
  <!-- Domain -->
  <text x="600" y="530" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif" font-size="20" fill="#6366f1">jayshomefinder.com</text>
</svg>
